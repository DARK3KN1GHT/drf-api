{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Agenda{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  {% block extra_css %}{% endblock %}
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <span class="brand__icon">🗓️</span>
        <span class="brand__name">Agenda</span>
      </div>

      <nav class="nav">
        <a class="nav__link" href="{% url 'home' %}">Início</a>
        <a class="nav__link" href="{% url 'agendar' %}">Agendar</a>
        <a class="nav__link" href="/admin/">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p>© {% now "Y" %} Agenda</p>
    </div>
  </footer>

  {% block extra_js %}{% endblock %}
</body>
</html>
