{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agenda{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="app-body">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Agenda</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavbar">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'home' %}">Início</a>
                    <a class="nav-link" href="{% url 'agendar' %}">Agendar</a>
                    <a class="nav-link" href="/admin/">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-wrapper">
        <div class="container-fluid px-3 px-md-4 px-lg-5">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="footer-custom">
        <div class="container-fluid px-4 px-lg-5 text-center">
            © 2026 Agenda · Sistema de agendamento
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

    {% block scripts %}
    {% endblock %}
</body>
</html>
