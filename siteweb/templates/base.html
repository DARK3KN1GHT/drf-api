{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Agenda Online{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="/">
        <span class="me-2">🗓️</span>Agenda Online
      </a>

      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/agendar/">Agendar</a>
        <a class="btn btn-warning btn-sm" href="/api/agendamentos/">API</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% if messages %}
      <div class="mb-3">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} mb-2" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer class="py-4 border-top bg-white">
    <div class="container small text-muted d-flex justify-content-between">
      <span>© 2026 Agenda Online</span>
      <span>Atendimento • Agendamentos • Horários</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
