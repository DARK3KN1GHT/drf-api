{% extends "base.html" %}
{% block title %}Agenda Online • Agendar{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="bg-white rounded-4 shadow-sm border p-4 p-lg-5">
      <h1 class="h3 fw-bold mb-2">Novo agendamento</h1>
      <p class="text-muted mb-4">Preencha os dados para reservar seu horário.</p>

      <form method="post" class="row g-3">
        {% csrf_token %}

        <div class="col-12">
          <label class="form-label">Nome</label>
          <input type="text" name="nome" class="form-control form-control-lg" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Data</label>
          <input type="date" name="data" class="form-control form-control-lg" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Horário</label>
          <select name="horario" class="form-select form-select-lg" required>
            <option value="" selected disabled>Selecione...</option>
            {% for h in horarios %}
              <option value="{{ h.id }}">{{ h.hora }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12 d-grid mt-2">
          <button class="btn btn-primary btn-lg" type="submit">Confirmar agendamento</button>
        </div>

        <div class="col-12">
          <div class="small text-muted mt-2">
            Se não aparecer horário, cadastre horários no Admin primeiro.
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
